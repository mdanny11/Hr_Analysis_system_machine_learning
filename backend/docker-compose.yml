services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ison
      POSTGRES_PASSWORD: ison_secret
      POSTGRES_DB: ison_hr
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ison -d ison_hr"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://ison:ison_secret@postgres:5432/ison_hr
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "python scripts/seed.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:
